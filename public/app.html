<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PolyEdge</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#16161f;
  --border:rgba(255,255,255,0.07);
  --accent:#8b5cf6;--accent-dim:rgba(139,92,246,0.12);
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --muted:#6b7280;--text:#f1f5f9;--text2:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:68px}
::-webkit-scrollbar{width:0}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;font-family:inherit;transition:color .15s;position:relative}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:21px;height:21px}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:#ef4444;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}

/* SCREENS */
.screen{display:none;min-height:100vh}
.screen.active{display:block;animation:fadeUp .15s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;background:var(--bg)}
.header-left{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.header-back{background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;display:flex;align-items:center;gap:4px;font-size:13px;font-family:inherit}
.header-back svg{width:18px;height:18px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.header-badge{font-size:10px;color:var(--accent);border:1px solid rgba(139,92,246,.3);padding:3px 8px;border-radius:20px;background:var(--accent-dim);text-transform:uppercase;font-weight:500;letter-spacing:.5px}

/* CONTENT */
.content{padding:14px 16px}

/* HERO */
.hero{background:linear-gradient(135deg,rgba(139,92,246,.13) 0%,rgba(109,40,217,.05) 100%);border:1px solid rgba(139,92,246,.22);border-radius:16px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:radial-gradient(circle,rgba(139,92,246,.14),transparent 70%);border-radius:50%}
.hero-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.hero-pnl{font-size:42px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.hero-pnl.up{color:var(--green)}.hero-pnl.down{color:var(--red)}
.hero-row{display:flex;gap:16px;margin-top:12px}
.hero-stat{display:flex;flex-direction:column;gap:2px}
.hero-stat-v{font-size:15px;font-weight:600}
.hero-stat-k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* SECTION */
.sec-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin:14px 0 8px}

/* POSITION CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:13px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent}
.card:active{border-color:rgba(139,92,246,.35);background:rgba(139,92,246,.04)}
.card-left{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.tag-yes{background:rgba(16,185,129,.12);color:var(--green)}
.tag-no{background:rgba(239,68,68,.12);color:var(--red)}
.tag-other{background:var(--accent-dim);color:var(--accent)}
.tag-strong{background:rgba(239,68,68,.12);color:#ef4444}
.tag-medium{background:rgba(245,158,11,.12);color:var(--amber)}
.tag-weak{background:rgba(107,114,128,.1);color:var(--muted)}
.card-sub{font-size:11px;color:var(--muted)}
.card-right{text-align:right;padding-left:10px;flex-shrink:0}
.card-price{font-size:17px;font-weight:700}
.card-pnl{font-size:12px;font-weight:500;margin-top:2px}
.up{color:var(--green)}.down{color:var(--red)}.neu{color:var(--muted)}
.chevron{color:var(--muted);margin-left:6px;flex-shrink:0}

/* SCORE BAR */
.score-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .5s ease}

/* DETAIL PAGE */
.detail-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.detail-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.detail-title{font-size:15px;font-weight:600;line-height:1.35}
.detail-sub{font-size:12px;color:var(--muted);margin-top:3px}
.detail-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.detail-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
.detail-stat-v{font-size:20px;font-weight:700}
.detail-stat-k{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.detail-row-k{font-size:12px;color:var(--muted)}
.detail-row-v{font-size:13px;font-weight:500;text-align:right;max-width:60%}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;border-radius:13px;font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-row{display:flex;flex-direction:column;gap:8px;padding:14px 16px}
.btn svg{width:16px;height:16px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-v{font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--accent)}
.stat-k{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* CHAT */
.chat-messages{height:calc(100dvh - 210px);overflow-y:auto;padding:14px 16px}
.msg{margin-bottom:10px}
.msg.user{text-align:right}
.bubble{display:inline-block;max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;text-align:left}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:4px}
.chat-bar{position:fixed;bottom:68px;left:0;right:0;padding:10px 12px;background:var(--bg);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
.chat-in{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:10px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.chat-in::placeholder{color:var(--muted)}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send svg{width:16px;height:16px;fill:white}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:13px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:10px}

/* VIRIX */
.virix{display:flex;align-items:center;justify-content:center;gap:5px;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:6px}
.virix a{color:var(--accent);text-decoration:none;font-weight:500}
</style>
</head>
<body>

<!-- ═══ SCREEN: PORTFOLIO LIST ═══ -->
<div id="s-portfolio" class="screen active">
  <div class="header">
    <div class="header-left"><div class="live-dot"></div>PolyEdge</div>
    <span class="header-badge">LIVE</span>
  </div>
  <div id="portfolio-content" class="loader-wrap">
    <div class="loader"><div class="spinner"></div>Loading positions...</div>
  </div>
</div>

<!-- ═══ SCREEN: POSITION DETAIL ═══ -->
<div id="s-pos-detail" class="screen">
  <div class="header">
    <button class="header-back" onclick="back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Portfolio
    </button>
  </div>
  <div id="pos-detail-content"></div>
</div>

<!-- ═══ SCREEN: SIGNALS LIST ═══ -->
<div id="s-signals" class="screen">
  <div class="header">
    <div class="header-left"><div class="live-dot"></div>Signals</div>
    <span class="header-badge" id="signals-count-badge">—</span>
  </div>
  <div id="signals-content">
    <div class="loader"><div class="spinner"></div>Scanning markets...</div>
  </div>
</div>

<!-- ═══ SCREEN: SIGNAL DETAIL ═══ -->
<div id="s-sig-detail" class="screen">
  <div class="header">
    <button class="header-back" onclick="back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Signals
    </button>
  </div>
  <div id="sig-detail-content"></div>
</div>

<!-- ═══ SCREEN: WALLET DETAIL ═══ -->
<div id="s-wallet-detail" class="screen">
  <div class="header">
    <button class="header-back" onclick="back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Signals
    </button>
  </div>
  <div id="wallet-detail-content"></div>
</div>

<!-- ═══ SCREEN: STATS ═══ -->
<div id="s-stats" class="screen">
  <div class="header">
    <div class="header-left"><div class="live-dot"></div>Statistics</div>
  </div>
  <div id="stats-content">
    <div class="loader"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<!-- ═══ SCREEN: CHAT ═══ -->
<div id="s-chat" class="screen">
  <div class="header">
    <div class="header-left"><div class="live-dot"></div>AI Analyst</div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg ai"><div class="bubble">Hey 👋 I watch your Polymarket portfolio 24/7.<br>Ask me about positions, signals, or strategy.</div></div>
  </div>
  <div class="chat-bar">
    <input class="chat-in" id="chat-in" placeholder="Ask anything..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
  </div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="nav">
  <button class="nav-btn active" id="nb-portfolio" onclick="showTab('portfolio')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Portfolio
  </button>
  <button class="nav-btn" id="nb-signals" onclick="showTab('signals')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>Signals
    <span class="nav-badge" id="sig-badge" style="display:none">0</span>
  </button>
  <button class="nav-btn" id="nb-stats" onclick="showTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Stats
  </button>
  <button class="nav-btn" id="nb-chat" onclick="showTab('chat')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>AI Chat
  </button>
</nav>

<script>
const API = window.__API_URL__ || 'https://blast-wright-boulder-follows.trycloudflare.com';

// ══ ROUTER ══════════════════════════════════════════════════════
let _history = [];
let _tab = 'portfolio';
let _portfolio = null;
let _signals = null;

function showScreen(id, pushHistory=true) {
  if (pushHistory && _history[_history.length-1] !== id) _history.push(id);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-'+id)?.classList.add('active');
  window.scrollTo(0,0);
}

function back() {
  _history.pop();
  const prev = _history[_history.length-1] || _tab;
  showScreen(prev, false);
}

function showTab(tab) {
  _tab = tab;
  _history = [tab];
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nb-'+tab)?.classList.add('active');
  showScreen(tab, false);
  if (tab==='portfolio' && !_portfolio) loadPortfolio();
  if (tab==='signals' && !_signals) loadSignals();
  if (tab==='stats') loadStats();
}

// ══ HELPERS ══════════════════════════════════════════════════════
const fmt = (n, prefix=true) => {
  const sign = n>=0 ? (prefix?'+':'' ) : '-';
  return sign + '$' + Math.abs(n).toFixed(2);
};
const pct2c = (p) => Math.round((p||0)*100) + '¢';
const slug = (t='') => t.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,60);
const polyUrl = (market) => {
  if (market?.slug) return 'https://polymarket.com/event/' + market.slug;
  return 'https://polymarket.com/event/' + slug(market?.title || market?.market || market || '');
};
const openExternal = (url) => {
  const tg = window.Telegram?.WebApp;
  if (tg?.openLink) tg.openLink(url); else window.open(url,'_blank');
};

// ══ PORTFOLIO ════════════════════════════════════════════════════
async function loadPortfolio() {
  // Use SSR-injected data first (no CORS/network needed)
  if (window.__SSR__?.portfolio) {
    _portfolio = window.__SSR__.portfolio;
    renderPortfolio(_portfolio);
    return;
  }
  try {
    const r = await fetch(API+'/api/portfolio');
    const {data} = await r.json();
    _portfolio = data;
    renderPortfolio(data);
  } catch(e) {
    document.getElementById('portfolio-content').innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>'+e.message+'</div>';
  }
}

function renderPortfolio(d) {
  const pnl = d.totalPnl, isUp = pnl>=0, pct = d.pnlPct.toFixed(1);
  const sorted = [...d.positions].sort((a,b)=>Math.abs(b.cashPnl||0)-Math.abs(a.cashPnl||0));

  const cards = sorted.map((p,i) => {
    const ppnl = p.cashPnl||0, pr = Math.round((p.curPrice||0)*100);
    const oc = (p.outcome||'').toLowerCase();
    const tagCls = oc==='yes'?'yes':oc==='no'?'no':'other';
    const pCls = ppnl>0?'up':ppnl<0?'down':'neu';
    return `<div class="card" onclick="openPosition(${i})">
      <div class="card-left">
        <div class="card-title">${(p.title||'').slice(0,54)}</div>
        <div class="card-meta">
          <span class="tag tag-${tagCls}">${p.outcome}</span>
          <span class="card-sub">$${p.currentValue?.toFixed(0)}</span>
        </div>
      </div>
      <div class="card-right">
        <div class="card-price">${pr}¢</div>
        <div class="card-pnl ${pCls}">${fmt(ppnl)}</div>
      </div>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }).join('');

  document.getElementById('portfolio-content').innerHTML = `
    <div class="content">
      <div class="hero">
        <div class="hero-label">Total P&amp;L</div>
        <div class="hero-pnl ${isUp?'up':'down'}">${fmt(pnl)}</div>
        <div class="hero-row">
          <div class="hero-stat"><span class="hero-stat-v ${isUp?'up':'down'}">${isUp?'+':''}${pct}%</span><span class="hero-stat-k">ROI</span></div>
          <div class="hero-stat"><span class="hero-stat-v">$${d.totalValue?.toFixed(0)}</span><span class="hero-stat-k">Value</span></div>
          <div class="hero-stat"><span class="hero-stat-v">${d.positions.length}</span><span class="hero-stat-k">Open</span></div>
        </div>
      </div>
      <div class="sec-title">Active Positions</div>
      ${cards}
      <div class="virix">by <a href="https://virixlabs.com" target="_blank">Virix Labs</a></div>
    </div>`;
}

// ══ POSITION DETAIL ═══════════════════════════════════════════════
function openPosition(idx) {
  const p = _portfolio?.positions?.[idx];
  if (!p) return;
  // re-sort same way
  const sorted = [..._portfolio.positions].sort((a,b)=>Math.abs(b.cashPnl||0)-Math.abs(a.cashPnl||0));
  renderPositionDetail(sorted[idx]);
  showScreen('pos-detail');
}

function renderPositionDetail(p) {
  const ppnl = p.cashPnl||0, pr = (p.curPrice||0)*100;
  const pCls = ppnl>0?'up':ppnl<0?'down':'neu';
  const oc = (p.outcome||'').toLowerCase();
  const tagCls = oc==='yes'?'yes':oc==='no'?'no':'other';
  const cost = p.initialValue||0;
  const pnlPct = cost>0?((ppnl/cost)*100).toFixed(1):'—';
  const polyLink = 'https://polymarket.com/event/' + (p.slug || slug(p.title||''));
  const icon = pr>=90?'🟢':pr>=50?'🟡':'🔴';
  const resolved = (p.curPrice||0) >= 0.99;

  document.getElementById('pos-detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-icon" style="background:var(--accent-dim)">${icon}</div>
      <div>
        <div class="detail-title">${p.title||''}</div>
        <div class="detail-sub">${p.outcome} · ${resolved?'Resolving soon':'Active'}</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Position Overview</div>
      <div class="detail-stats">
        <div class="detail-stat">
          <div class="detail-stat-v">${Math.round(pr)}¢</div>
          <div class="detail-stat-k">Current Price</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-v ${pCls}">${fmt(ppnl)}</div>
          <div class="detail-stat-k">P&amp;L</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-v">$${p.currentValue?.toFixed(2)}</div>
          <div class="detail-stat-k">Market Value</div>
        </div>
        <div class="detail-stat">
          <div class="detail-stat-v ${parseFloat(pnlPct)>=0?'up':'down'}">${pnlPct}%</div>
          <div class="detail-stat-k">ROI</div>
        </div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Details</div>
      <div class="detail-row"><span class="detail-row-k">Outcome</span><span class="tag tag-${tagCls}">${p.outcome}</span></div>
      <div class="detail-row"><span class="detail-row-k">Shares held</span><span class="detail-row-v">${(p.size||0).toFixed(1)}</span></div>
      <div class="detail-row"><span class="detail-row-k">Avg buy price</span><span class="detail-row-v">${cost>0&&p.size>0?Math.round(cost/p.size*100)+'¢':'—'}</span></div>
      <div class="detail-row"><span class="detail-row-k">Cost basis</span><span class="detail-row-v">$${cost.toFixed(2)}</span></div>
      <div class="detail-row"><span class="detail-row-k">Potential payout</span><span class="detail-row-v up">$${(p.size||0).toFixed(2)}</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="openExternal('${polyLink}')">

        Open on Polymarket

// ══ SIGNALS ══════════════════════════════════════════════════════
async function loadSignals() {
  if (window.__SSR__?.signals) {
    _signals = (window.__SSR__.signals.signals || []).sort((a,b)=>(b.score||0)-(a.score||0));
    renderSignals(_signals);
    const strong = _signals.filter(s=>s.score>=8).length;
    if (strong>0){const b=document.getElementById('sig-badge');if(b){b.style.display='flex';b.textContent=strong;}}
    const cb=document.getElementById('signals-count-badge');if(cb)cb.textContent=_signals.length+' signals';
    return;
  }
  try {
    const r = await fetch(API+'/api/signals');
    const {data} = await r.json();
    _signals = (data?.signals||[]).sort((a,b)=>(b.score||0)-(a.score||0));
    renderSignals(_signals);
    // update badge
    const strong = _signals.filter(s=>s.score>=8).length;
    const badge = document.getElementById('sig-badge');
    const countBadge = document.getElementById('signals-count-badge');
    if (strong>0){badge.style.display='flex';badge.textContent=strong;}
    if(countBadge) countBadge.textContent = _signals.length + ' signals';
  } catch(e) {
    document.getElementById('signals-content').innerHTML='<div class="empty"><div class="empty-icon">📡</div>Error loading signals</div>';
  }
}

function renderSignals(sigs) {
  if (!sigs||!sigs.length) {
    document.getElementById('signals-content').innerHTML='<div class="empty"><div class="empty-icon">📡</div>No signals right now.<br>Scanner runs every 30 min.</div>';
    return;
  }
  const cards = sigs.slice(0,15).map((s,i)=>{
    const score=s.score||0, isStrong=score>=8, isMed=score>=5;
    const lvl=isStrong?'strong':isMed?'medium':'weak';
    const fillColor=isStrong?'#ef4444':isMed?'#f59e0b':'#6b7280';
    const fillW=Math.round(score/10*100);
    const hasWallet = s.type==='smartwallet' && s.addr;
    return `<div class="card" onclick="openSignal(${i})">
      <div class="card-left">
        <div class="card-meta" style="margin-bottom:6px">
          <span class="tag tag-${lvl}">${(s.type||'').replace('_',' ')}</span>
          ${hasWallet?`<span class="card-sub">${s.addr.slice(0,8)}...</span>`:''}
        </div>
        <div class="card-title">${(s.market||s.title||'').slice(0,60)}</div>
        ${s.side?`<div class="card-sub" style="margin-top:4px">Side: ${s.side}${s.amount?' · $'+s.amount:''}</div>`:''}
        <div class="score-bar"><div class="score-fill" style="width:${fillW}%;background:${fillColor}"></div></div>
      </div>
      <div class="card-right" style="padding-left:8px">
        <div class="card-price ${isStrong?'down':isMed?'':'neu'}">${score.toFixed(1)}</div>
        <div class="card-sub">/10</div>
      </div>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }).join('');

  document.getElementById('signals-content').innerHTML=`
    <div class="content">
      <div class="sec-title">Live Market Signals</div>
      ${cards}
      <div class="virix">by <a href="https://virixlabs.com" target="_blank">Virix Labs</a></div>
    </div>`;
}

// ══ SIGNAL DETAIL ════════════════════════════════════════════════
function openSignal(i) {
  const s = _signals?.[i];
  if (!s) return;
  if (s.type==='smartwallet' && s.addr) {
    renderWalletDetail(s);
    showScreen('wallet-detail');
  } else {
    renderSignalDetail(s);
    showScreen('sig-detail');
  }
}

function renderSignalDetail(s) {
  const score=s.score||0, isStrong=score>=8, isMed=score>=5;
  const lvl=isStrong?'strong':isMed?'medium':'weak';
  const fillColor=isStrong?'#ef4444':isMed?'#f59e0b':'#6b7280';
  const polyLink='https://polymarket.com/event/'+slug(s.market||s.title||'');
  const typeLabels={ob_imbalance:'Order Book Imbalance',whale_order:'Whale Order',price_drift:'Price Drift',vol_spike:'Volume Spike',news_edge:'News Edge',cross_market:'Cross-Market Arb'};
  const typeLabel=typeLabels[s.type]||s.type;
  const icons={ob_imbalance:'⚖️',whale_order:'🐋',price_drift:'📈',vol_spike:'⚡',news_edge:'📰',cross_market:'🔗'};
  const icon=icons[s.type]||'📡';

  let detailRows = '';
  if (s.side) detailRows+=`<div class="detail-row"><span class="detail-row-k">Side</span><span class="detail-row-v tag tag-${s.side.toLowerCase()==='yes'?'yes':s.side.toLowerCase()==='no'?'no':'other'}">${s.side}</span></div>`;
  if (s.price) detailRows+=`<div class="detail-row"><span class="detail-row-k">Price</span><span class="detail-row-v">${Math.round((s.price||0)*100)}¢</span></div>`;
  if (s.amount) detailRows+=`<div class="detail-row"><span class="detail-row-k">Order Size</span><span class="detail-row-v up">$${s.amount}</span></div>`;
  if (s.ratio) detailRows+=`<div class="detail-row"><span class="detail-row-k">Bid/Ask Ratio</span><span class="detail-row-v">${s.ratio}x</span></div>`;
  if (s.bidDepth) detailRows+=`<div class="detail-row"><span class="detail-row-k">Bid Depth</span><span class="detail-row-v up">$${s.bidDepth}</span></div>`;
  if (s.askDepth) detailRows+=`<div class="detail-row"><span class="detail-row-k">Ask Depth</span><span class="detail-row-v down">$${s.askDepth}</span></div>`;
  if (s.from) detailRows+=`<div class="detail-row"><span class="detail-row-k">Price Move</span><span class="detail-row-v">${Math.round(s.from*100)}¢ → ${Math.round((s.to||0)*100)}¢</span></div>`;
  if (s.volume) detailRows+=`<div class="detail-row"><span class="detail-row-k">Volume Spike</span><span class="detail-row-v">$${s.volume}</span></div>`;
  if (s.edgePct) detailRows+=`<div class="detail-row"><span class="detail-row-k">Edge</span><span class="detail-row-v up">+${s.edgePct}pp</span></div>`;

  document.getElementById('sig-detail-content').innerHTML=`
    <div class="detail-header">
      <div class="detail-icon" style="background:var(--accent-dim);font-size:22px">${icon}</div>
      <div>
        <div class="detail-title">${typeLabel}</div>
        <div class="detail-sub">Score: ${score.toFixed(1)}/10 · ${isStrong?'Strong':'Medium'} signal</div>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Market</div>
      <div style="font-size:14px;line-height:1.5;color:var(--text)">${s.market||s.title||''}</div>
      ${s.newsContext?`<div style="margin-top:10px;font-size:12px;color:var(--muted);line-height:1.5">📰 ${s.newsContext}</div>`:''}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Signal Data</div>
      ${detailRows||'<div style="color:var(--muted);font-size:13px">No additional data</div>'}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Confidence</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="score-bar" style="flex:1;height:6px"><div class="score-fill" style="width:${Math.round(score/10*100)}%;background:${fillColor}"></div></div>
        <span style="font-size:15px;font-weight:700;color:${fillColor}">${score.toFixed(1)}/10</span>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--muted)">${isStrong?'🔴 Strong signal — auto-trade may trigger':isMed?'🟡 Medium signal — monitor closely':'⚪ Weak signal — informational only'}</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="openExternal('${polyLink}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        View on Polymarket
      </button>
    </div>`;
}

// ══ CHAT ═════════════════════════════════════════════════════════
async function sendChat() {
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  addMsg('user',msg);
  const el=addMsg('ai','...');
  try{
    const r=await fetch(API+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,portfolio:_portfolio})});
    const {data}=await r.json();
    el.querySelector('.bubble').textContent=data?.reply||'Error';
  }catch{el.querySelector('.bubble').textContent='Connection error';}
}

function addMsg(role,text){
  const w=document.getElementById('chat-messages');
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML='<div class="bubble">'+text+'</div>';
  w.appendChild(d);
  w.scrollTop=w.scrollHeight;
  return d;
}
