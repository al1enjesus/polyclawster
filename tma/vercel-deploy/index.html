<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PolyEdge</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0f;
  --bg2:     #111118;
  --bg3:     #16161f;
  --border:  rgba(255,255,255,0.06);
  --accent:  #8b5cf6;
  --accent2: #7c3aed;
  --green:   #10b981;
  --red:     #ef4444;
  --muted:   #6b7280;
  --text:    #f1f5f9;
  --text2:   #94a3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 72px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 0; }

/* ── PAGES ── */
.page { display: none; padding: 16px; padding-top: 0; animation: fadeIn .15s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 16px 8px;
  position: sticky; top: 0; z-index: 20;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.header-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
}
.header-logo .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.header-badge {
  font-size: 10px; color: var(--accent); border: 1px solid rgba(139,92,246,.3);
  padding: 3px 8px; border-radius: 20px; background: rgba(139,92,246,.08);
  letter-spacing: 0.5px; text-transform: uppercase; font-weight: 500;
}

/* ── HERO STATS ── */
.hero {
  margin: 16px 0;
  padding: 20px;
  background: linear-gradient(135deg, rgba(139,92,246,.12) 0%, rgba(109,40,217,.06) 100%);
  border: 1px solid rgba(139,92,246,.2);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(139,92,246,.15), transparent 70%);
  border-radius: 50%;
}
.hero-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.hero-pnl { font-size: 40px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; }
.hero-pnl.up { color: var(--green); }
.hero-pnl.down { color: var(--red); }
.hero-sub {
  display: flex; gap: 12px; margin-top: 10px;
}
.hero-stat {
  display: flex; flex-direction: column; gap: 2px;
}
.hero-stat-val { font-size: 14px; font-weight: 600; color: var(--text); }
.hero-stat-key { font-size: 10px; color: var(--muted); }

/* ── SECTION ── */
.section { margin-bottom: 8px; }
.section-title {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.8px; padding: 12px 0 6px; font-weight: 500;
}

/* ── POSITION CARD ── */
.pos-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: border-color .15s;
}
.pos-card:active { border-color: rgba(139,92,246,.3); }
.pos-left { flex: 1; min-width: 0; }
.pos-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pos-meta { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
.pos-outcome {
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 6px; text-transform: uppercase; letter-spacing: 0.3px;
}
.pos-outcome.yes { background: rgba(16,185,129,.12); color: var(--green); }
.pos-outcome.no  { background: rgba(239,68,68,.12);  color: var(--red); }
.pos-outcome.other { background: rgba(139,92,246,.12); color: var(--accent); }
.pos-value { font-size: 11px; color: var(--muted); }
.pos-right { text-align: right; padding-left: 10px; flex-shrink: 0; }
.pos-price { font-size: 16px; font-weight: 700; }
.pos-pnl { font-size: 12px; font-weight: 500; margin-top: 2px; }
.up { color: var(--green); }
.down { color: var(--red); }
.neutral { color: var(--muted); }

/* ── SIGNAL CARD ── */
.sig-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.sig-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.sig-type {
  font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.sig-type.strong { background: rgba(239,68,68,.12); color: #ef4444; }
.sig-type.medium { background: rgba(245,158,11,.12); color: #f59e0b; }
.sig-type.weak   { background: rgba(107,114,128,.1);  color: var(--muted); }
.sig-score { font-size: 12px; font-weight: 600; }
.sig-score.s { color: #ef4444; }
.sig-score.m { color: #f59e0b; }
.sig-market { font-size: 13px; color: var(--text); line-height: 1.4; }
.sig-detail { font-size: 11px; color: var(--muted); margin-top: 5px; }
.sig-score-bar {
  height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden;
}
.sig-score-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
}
.stat-val { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: var(--accent); }
.stat-key { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── CHAT ── */
.chat-wrap { height: calc(100dvh - 200px); overflow-y: auto; padding-bottom: 12px; }
.msg { margin-bottom: 10px; }
.msg.user { text-align: right; }
.bubble {
  display: inline-block; max-width: 82%; padding: 10px 14px;
  border-radius: 16px; font-size: 14px; line-height: 1.5; text-align: left;
}
.msg.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.ai   .bubble { background: var(--bg2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.chat-bar {
  position: fixed; bottom: 72px; left: 0; right: 0;
  padding: 10px 12px; background: var(--bg); border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.chat-input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 24px; padding: 10px 16px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none;
}
.chat-input::placeholder { color: var(--muted); }
.chat-send {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.chat-send svg { width: 16px; height: 16px; fill: white; }

/* ── BOTTOM NAV ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 8px; gap: 4px; background: none; border: none; cursor: pointer;
  color: var(--muted); transition: color .15s;
  font-size: 10px; font-family: inherit;
}
.nav-item.active { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }
.nav-dot {
  position: absolute; top: 6px; right: calc(50% - 18px);
  width: 6px; height: 6px; background: #ef4444; border-radius: 50%;
}
.nav-item { position: relative; }

/* ── LOADING ── */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 60px 20px; gap: 12px; color: var(--muted); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── VIRIXLABS BADGE ── */
.virix-badge {
  display: flex; align-items: center; gap: 6px; justify-content: center;
  padding: 8px; color: var(--muted); font-size: 11px;
  border-top: 1px solid var(--border); margin-top: 8px;
}
.virix-badge a { color: var(--accent); text-decoration: none; font-weight: 500; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <div class="dot"></div>
    PolyEdge
  </div>
  <span class="header-badge" id="header-badge">LIVE</span>
</div>

<!-- PAGE: PORTFOLIO -->
<div id="page-portfolio" class="page active">
  <div id="portfolio-content">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<!-- PAGE: SIGNALS -->
<div id="page-signals" class="page">
  <div id="signals-content">
    <div class="loading"><div class="spinner"></div>Scanning...</div>
  </div>
</div>

<!-- PAGE: STATS -->
<div id="page-stats" class="page">
  <div id="stats-content">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<!-- PAGE: CHAT -->
<div id="page-chat" class="page">
  <div class="chat-wrap" id="chat-wrap">
    <div style="height:12px"></div>
    <div class="msg ai">
      <div class="bubble">Hey 👋 I'm watching your Polymarket portfolio 24/7. Ask me anything — positions, signals, strategy.</div>
    </div>
  </div>
  <div class="chat-bar">
    <input class="chat-input" id="chat-input" placeholder="Ask about your portfolio..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-item active" onclick="goto('portfolio',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    Portfolio
  </button>
  <button class="nav-item" onclick="goto('signals',this)" id="nav-signals">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
    </svg>
    Signals
  </button>
  <button class="nav-item" onclick="goto('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    Stats
  </button>
  <button class="nav-item" onclick="goto('chat',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    AI Chat
  </button>
</nav>

<script>
const API = 'https://blast-wright-boulder-follows.trycloudflare.com';
let _portfolio = null;
let _signalCount = 0;

// ── NAVIGATION ──────────────────────────────────────────────────
function goto(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
  if (page === 'portfolio' && !_portfolio) loadPortfolio();
  if (page === 'signals') loadSignals();
  if (page === 'stats') loadStats();
  if (page === 'chat') setTimeout(() => {
    const w = document.getElementById('chat-wrap');
    w.scrollTop = w.scrollHeight;
  }, 50);
}

// ── PORTFOLIO ───────────────────────────────────────────────────
async function loadPortfolio() {
  try {
    const r = await fetch(API + '/api/portfolio');
    const { data } = await r.json();
    _portfolio = data;
    renderPortfolio(data);
  } catch(e) {
    document.getElementById('portfolio-content').innerHTML =
      '<div class="empty"><div class="empty-icon">⚡</div>Connection error</div>';
  }
}

function fmt(n, sign=true) {
  const abs = Math.abs(n).toFixed(2);
  if (!sign) return '$' + abs;
  return (n >= 0 ? '+$' : '-$') + abs;
}

function renderPortfolio(d) {
  const pnl = d.totalPnl;
  const isUp = pnl >= 0;
  const pct = d.pnlPct.toFixed(1);

  // Sort: biggest P&L first
  const sorted = [...d.positions].sort((a,b) => Math.abs(b.cashPnl||0) - Math.abs(a.cashPnl||0));

  const positions = sorted.map(p => {
    const pnl = p.cashPnl || 0;
    const price = Math.round((p.curPrice || 0) * 100);
    const outcome = p.outcome?.toLowerCase();
    const oc = outcome === 'yes' ? 'yes' : outcome === 'no' ? 'no' : 'other';
    const pnlCls = pnl > 0 ? 'up' : pnl < 0 ? 'down' : 'neutral';
    return `
    <div class="pos-card">
      <div class="pos-left">
        <div class="pos-title">${p.title?.slice(0,52)}</div>
        <div class="pos-meta">
          <span class="pos-outcome ${oc}">${p.outcome}</span>
          <span class="pos-value">$${p.currentValue?.toFixed(0)}</span>
        </div>
      </div>
      <div class="pos-right">
        <div class="pos-price">${price}¢</div>
        <div class="pos-pnl ${pnlCls}">${fmt(pnl)}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('portfolio-content').innerHTML = `
    <div class="hero">
      <div class="hero-label">Today's P&amp;L</div>
      <div class="hero-pnl ${isUp ? 'up' : 'down'}">${fmt(pnl)}</div>
      <div class="hero-sub">
        <div class="hero-stat">
          <span class="hero-stat-val">${isUp ? '+' : ''}${pct}%</span>
          <span class="hero-stat-key">ROI</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-val">$${d.totalValue?.toFixed(0)}</span>
          <span class="hero-stat-key">Portfolio</span>
        </div>
        <div class="hero-stat">
          <span class="hero-stat-val">${d.positions.length}</span>
          <span class="hero-stat-key">Positions</span>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Active Positions</div>
      ${positions}
    </div>
    <div class="virix-badge">
      Powered by <a href="https://virixlabs.com" target="_blank">Virix Labs</a>
    </div>`;
}

// ── SIGNALS ─────────────────────────────────────────────────────
async function loadSignals() {
  const el = document.getElementById('signals-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Scanning...</div>';
  try {
    const r = await fetch(API + '/api/signals');
    const { data } = await r.json();
    const sigs = (data?.signals || []).sort((a,b) => (b.score||0) - (a.score||0));

    if (!sigs.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📡</div>No signals right now.<br>Scanner runs every 30 min.</div>';
      return;
    }

    _signalCount = sigs.filter(s => s.score >= 8).length;

    const cards = sigs.slice(0, 10).map(s => {
      const score = s.score || 0;
      const isStrong = score >= 8;
      const isMed = score >= 5;
      const typeCls = isStrong ? 'strong' : isMed ? 'medium' : 'weak';
      const scoreCls = isStrong ? 's' : 'm';
      const fillColor = isStrong ? '#ef4444' : isMed ? '#f59e0b' : '#6b7280';
      const fillWidth = Math.round(score / 10 * 100);
      return `
      <div class="sig-card">
        <div class="sig-header">
          <span class="sig-type ${typeCls}">${s.type?.replace('_',' ')}</span>
          <span class="sig-score ${isStrong ? 's' : 'm'}">${score.toFixed(1)}/10</span>
        </div>
        <div class="sig-market">${(s.market||s.title||'').slice(0,72)}</div>
        ${s.newsContext ? `<div class="sig-detail">📰 ${s.newsContext.slice(0,80)}</div>` : ''}
        ${s.side ? `<div class="sig-detail">Side: ${s.side}${s.amount ? ' · $'+s.amount : ''}</div>` : ''}
        <div class="sig-score-bar">
          <div class="sig-score-fill" style="width:${fillWidth}%;background:${fillColor}"></div>
        </div>
      </div>`;
    }).join('');

    const ts = data.ts ? new Date(data.ts).toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'}) : '';
    el.innerHTML = `
      <div class="section">
        <div class="section-title">Latest Signals ${ts ? '· ' + ts : ''}</div>
        ${cards}
      </div>
      <div class="virix-badge">
        Powered by <a href="https://virixlabs.com" target="_blank">Virix Labs</a>
      </div>`;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>Error loading signals</div>';
  }
}

// ── STATS ────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById('stats-content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';
  try {
    const r = await fetch(API + '/api/stats');
    const { data } = await r.json();
    const s = data?.stats;
    if (!s) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div>No closed positions yet.<br>Stats appear after first resolved trade.</div>';
      return;
    }
    el.innerHTML = `
      <div class="hero" style="margin-top:16px">
        <div class="hero-label">Total P&amp;L (closed)</div>
        <div class="hero-pnl ${s.totalPnl > 0 ? 'up' : 'down'}">${fmt(parseFloat(s.totalPnl))}</div>
        <div class="hero-sub">
          <div class="hero-stat">
            <span class="hero-stat-val">${s.roi}%</span>
            <span class="hero-stat-key">ROI</span>
          </div>
          <div class="hero-stat">
            <span class="hero-stat-val">${s.total}</span>
            <span class="hero-stat-key">Trades</span>
          </div>
        </div>
      </div>
      <div class="stats-grid" style="margin-top:12px">
        <div class="stat-card">
          <div class="stat-val">${s.winRate}%</div>
          <div class="stat-key">Win Rate</div>
        </div>
        <div class="stat-card">
          <div class="stat-val">${s.wins}/${s.total}</div>
          <div class="stat-key">Won / Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-val up">+$${s.avgWin}</div>
          <div class="stat-key">Avg Win</div>
        </div>
        <div class="stat-card">
          <div class="stat-val down">$${s.avgLoss}</div>
          <div class="stat-key">Avg Loss</div>
        </div>
      </div>
      <div class="virix-badge">
        Powered by <a href="https://virixlabs.com" target="_blank">Virix Labs</a>
      </div>`;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>Error loading stats</div>';
  }
}

// ── CHAT ─────────────────────────────────────────────────────────
async function sendChat() {
  const inp = document.getElementById('chat-input');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  addMsg('user', msg);

  const thinking = addMsg('ai', '...');
  try {
    const r = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, portfolio: _portfolio })
    });
    const { data } = await r.json();
    thinking.querySelector('.bubble').textContent = data?.reply || 'Error';
  } catch {
    thinking.querySelector('.bubble').textContent = 'Connection error';
  }
}

function addMsg(role, text) {
  const wrap = document.getElementById('chat-wrap');
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = `<div class="bubble">${text}</div>`;
  wrap.appendChild(el);
  wrap.scrollTop = wrap.scrollHeight;
  return el;
}

// ── INIT ──────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

loadPortfolio();
</script>
</body>
</html>
